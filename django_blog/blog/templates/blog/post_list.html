<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post List</title>
</head>
<body>
    <h1>All Blog Posts</h1>
    <ul>
      {% for post in posts %}
        <li>
          <a href="{% url 'post-detail' post.id %}">{{ post.title }}</a> by {{ post.author }} on {{ post.date_posted }}
        </li>
      {% endfor %}
    </ul>
</body>
</html>
